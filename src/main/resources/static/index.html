<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <h1>Employee Management System</h1>
        <p>Spring Boot + H2 Database</p>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>

        <!-- ===== EMPLOYEE FORM ===== -->
        <section class="form-section">
            <h2 id="form-title">Add New Employee</h2>

            <!-- Hidden input to store the ID when editing -->
            <input type="hidden" id="employee-id">

            <div class="form-grid">

                <div class="form-group">
                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" placeholder="e.g. John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="e.g. john@example.com">
                </div>

                <div class="form-group">
                    <label for="department">Department <span class="required">*</span></label>
                    <input type="text" id="department" placeholder="e.g. Engineering">
                </div>

                <div class="form-group">
                    <label for="position">Position <span class="required">*</span></label>
                    <input type="text" id="position" placeholder="e.g. Software Developer">
                </div>

                <div class="form-group">
                    <label for="salary">Salary <span class="required">*</span></label>
                    <input type="number" id="salary" placeholder="e.g. 75000" min="1">
                </div>

            </div>

            <!-- Error message area -->
            <div id="form-error" class="error-box" style="display:none;"></div>

            <!-- Form buttons -->
            <div class="form-buttons">
                <button id="submit-btn" onclick="submitForm()">Add Employee</button>
                <button id="cancel-btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
            </div>
        </section>

        <!-- ===== SUCCESS / ERROR ALERT ===== -->
        <div id="alert" class="alert" style="display:none;"></div>

        <!-- ===== EMPLOYEE TABLE ===== -->
        <section class="table-section">
            <div class="table-header">
                <h2>All Employees</h2>
                <span id="employee-count" class="count-badge">0 employees</span>
            </div>

            <div class="table-wrapper">
                <table id="employee-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employee-tbody">
                        <!-- Rows are added dynamically by JavaScript -->
                        <tr id="no-data-row">
                            <td colspan="7" class="no-data">No employees found. Add one above!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>Employee Management System &bull; Built with Spring Boot 3.2.5 &bull;
           <a href="/h2-console" target="_blank">H2 Console</a>
        </p>
    </footer>

    <!-- Link our JavaScript file -->
    <script src="script.js"></script>

</body>
</html>
