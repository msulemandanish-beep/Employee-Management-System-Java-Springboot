# =============================================
# Application Name
# =============================================
spring.application.name=employee-management-system

# =============================================
# H2 In-Memory Database Configuration
# No installation needed - runs in memory!
# =============================================
spring.datasource.url=jdbc:h2:mem:employee_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================
# JPA / Hibernate Configuration
# JPA lets us work with database tables as Java objects
# =============================================

# "update" means Hibernate will auto-create/update tables based on our entities
spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries Hibernate generates (great for learning!)
spring.jpa.show-sql=true

# Format the SQL so it's readable in the console
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# H2 Console Configuration
# Visit http://localhost:8081/h2-console to see your database
# =============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# Server Port
# The app will run on http://localhost:8081
# =============================================
server.port=8083
